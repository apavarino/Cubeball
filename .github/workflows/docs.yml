name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements.txt"
      - "build.gradle.kts"
      - "src/main/resources/plugin.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    uses: Stellionix/docs-common/.github/workflows/deploy-docs.yml@main
